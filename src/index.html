<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
    <style>
      body {
        font-family: Arial;
        margin: 0;
        padding: 16px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 360px);
        gap: 24px;
        justify-content: center;
        padding: 24px;
        list-style: none;
      }

      .gallery-image {
        width: 100%;
        height: 100%;
        display: block;
        cursor: pointer;
        transition: transform 0.3s;
      }

      .gallery-image:hover {
        transform: scale(1.05);
      }
    </style>

    <link rel="stylesheet" href="./js/gallery.css" />
  </head>

  <body>
    <ul class="gallery"></ul>
    <script type="module" src="./js/01-gallery.js"></script>
    <script type="module" src="./js/02-form.js"></script>
  </body>
</html>
