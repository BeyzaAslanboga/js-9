    <title>Gallery</title>
    <style>
      body {
        font-family: Arial;
        margin: 0;
        padding: 16px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 360px);
        gap: 24px;
        justify-content: center;
        padding: 24px;
        list-style: none;
      }

      .gallery-image {
        width: 100%;
        height: 100%;
        display: block;
        cursor: pointer;
        transition: transform 0.3s;
      }

      .gallery-image:hover {
        transform: scale(1.05);
      }
    </style>
